<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outbound Campaign</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0d14;
      color: #d4d8e8;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: #111422;
      border-bottom: 1px solid #1e2235;
    }
    .header h1 { font-size: 1.15rem; color: #fff; font-weight: 600; letter-spacing: .3px; }
    .header-sub { font-size: 0.78rem; color: #5a6080; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary  { background: #4a7cf7; color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: #3a6ce6; }
    .btn-danger   { background: #c0392b; color: #fff; }
    .btn-danger:hover:not(:disabled)   { background: #a93226; }
    .btn-ghost    { background: #1e2235; color: #9aa0c0; border: 1px solid #2a2f4a; }
    .btn-ghost:hover:not(:disabled)    { background: #252a42; }
    .btn-sm       { padding: 6px 14px; font-size: 0.8rem; }

    /* ── Main layout ── */
    .main { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── Card ── */
    .card {
      background: #111422;
      border: 1px solid #1e2235;
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #5a6080;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Input section ── */
    .input-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
    textarea {
      flex: 1;
      height: 110px;
      background: #0b0d14;
      border: 1px solid #1e2235;
      border-radius: 6px;
      color: #d4d8e8;
      padding: 10px 12px;
      font-size: 0.87rem;
      resize: vertical;
      outline: none;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
    }
    textarea:focus { border-color: #4a7cf7; }
    textarea::placeholder { color: #3a3f60; }

    .input-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .delay-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      color: #6a70a0;
    }
    .delay-wrap input[type=number] {
      width: 60px;
      background: #0b0d14;
      border: 1px solid #1e2235;
      border-radius: 6px;
      color: #d4d8e8;
      padding: 6px 8px;
      font-size: 0.85rem;
      outline: none;
      text-align: center;
    }
    .delay-wrap input:focus { border-color: #4a7cf7; }

    #csv-input { display: none; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 0;
      background: #111422;
      border: 1px solid #1e2235;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .stat-item {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      border-right: 1px solid #1e2235;
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #5a6080;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-top: 4px;
    }
    .stat-item.calling .stat-num  { color: #4a7cf7; }
    .stat-item.done .stat-num     { color: #27ae60; }
    .stat-item.failed .stat-num   { color: #e74c3c; }
    .stat-item.voicemail .stat-num { color: #f39c12; }

    /* ── Progress bar ── */
    .progress-wrap {
      background: #111422;
      border: 1px solid #1e2235;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 18px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #5a6080;
      margin-bottom: 10px;
    }
    .progress-track {
      height: 6px;
      background: #1e2235;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a7cf7, #7b5cf7);
      border-radius: 3px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* ── Call list ── */
    .call-list { display: flex; flex-direction: column; gap: 10px; }

    .call-card {
      background: #111422;
      border: 1px solid #1e2235;
      border-radius: 8px;
      padding: 14px 18px;
      transition: border-color 0.2s;
    }
    .call-card.active { border-color: #2a3f7f; background: #0f1428; }

    .call-top {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .call-number {
      font-weight: 600;
      font-size: 0.95rem;
      color: #e0e4f8;
      font-family: 'Courier New', monospace;
      flex: 1;
      min-width: 140px;
    }
    .call-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Badges ── */
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    .badge-pending    { background: #1a1e30; color: #5a6080; }
    .badge-calling    { background: #0f1f4a; color: #4a7cf7; animation: pulse 1.2s ease-in-out infinite; }
    .badge-in-progress{ background: #0f1f4a; color: #4a7cf7; }
    .badge-ended      { background: #0d2b1a; color: #27ae60; }
    .badge-ended-vm   { background: #2b1f0d; color: #f39c12; }
    .badge-error      { background: #2b0d0d; color: #e74c3c; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    .sentiment {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .sentiment-Positive { background: #0d2b1a; color: #27ae60; }
    .sentiment-Negative { background: #2b0d0d; color: #e74c3c; }
    .sentiment-Neutral  { background: #1a1e30; color: #7a80a0; }
    .sentiment-Unknown  { background: #1a1e30; color: #5a6080; }

    .icon-check    { color: #27ae60; font-size: 0.85rem; }
    .icon-voicemail { color: #f39c12; font-size: 0.78rem; }
    .duration      { font-size: 0.78rem; color: #5a6080; }
    .retry-btn {
      background: none; border: 1px solid #3a3f60; color: #7a80a8;
      border-radius: 5px; padding: 2px 8px; font-size: 0.75rem;
      cursor: pointer; margin-left: 6px;
    }
    .retry-btn:hover { border-color: #5a80ff; color: #5a80ff; }

    .call-summary {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #7a80a8;
      line-height: 1.55;
      padding-top: 10px;
      border-top: 1px solid #1a1e2e;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .recording-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: #4a7cf7;
      text-decoration: none;
    }
    .recording-link:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: #3a3f60;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header h1" style="font-size:1.15rem;color:#fff;font-weight:600;">Outbound Campaign</div>
    <div class="header-sub">Powered by Retell AI</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" id="stop-btn" onclick="stopCampaign()" disabled>Stop</button>
    <button class="btn btn-ghost btn-sm" id="reset-btn" onclick="resetCampaign()">Reset</button>
  </div>
</div>

<div class="main">

  <!-- Input -->
  <div class="card">
    <div class="card-title">Phone Numbers</div>
    <textarea id="numbers-input"
      placeholder="+12025551234&#10;+13105559876&#10;+917708445038&#10;&#10;One number per line. Include country code."></textarea>
    <div class="input-controls" style="margin-top:12px;">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('csv-input').click()">
        Upload CSV
      </button>
      <input type="file" id="csv-input" accept=".csv,.txt" onchange="loadCSV(event)" />
      <div class="delay-wrap">
        Delay between calls:
        <input type="number" id="delay-input" value="2" min="0" max="60" />
        sec
      </div>
      <button class="btn btn-primary" id="start-btn" onclick="startCampaign()" style="margin-left:auto;">
        ▶ Start Campaign
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" style="display:none;">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-item calling">
      <div class="stat-num" id="stat-calling">0</div>
      <div class="stat-label">Calling</div>
    </div>
    <div class="stat-item done">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-item voicemail">
      <div class="stat-num" id="stat-voicemail">0</div>
      <div class="stat-label">Voicemail</div>
    </div>
    <div class="stat-item failed">
      <div class="stat-num" id="stat-failed">0</div>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap" style="display:none;">
    <div class="progress-header">
      <span id="progress-label">Campaign progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Call list -->
  <div class="call-list" id="call-list">
    <div class="empty" id="empty-state">Enter numbers above and click Start Campaign.</div>
  </div>

</div>

<script>
  let polling = null;

  // ── CSV upload ────────────────────────────────────────────────────────────────
  function loadCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const lines = ev.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l);
      document.getElementById("numbers-input").value = lines.join("\n");
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // ── Start ─────────────────────────────────────────────────────────────────────
  function startCampaign() {
    const raw     = document.getElementById("numbers-input").value;
    const numbers = raw.split("\n").map(n => n.trim()).filter(n => n);
    const delay   = parseInt(document.getElementById("delay-input").value) || 2;

    if (!numbers.length) { alert("Please enter at least one phone number."); return; }

    setRunningState(true);

    fetch("/start", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ numbers, delay }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        alert(data.error);
        setRunningState(false);
        return;
      }
      document.getElementById("stats-bar").style.display    = "flex";
      document.getElementById("progress-wrap").style.display = "block";
      document.getElementById("empty-state") && document.getElementById("empty-state").remove();
      if (polling) clearInterval(polling);
      polling = setInterval(fetchStatus, 3000);
      fetchStatus();
    })
    .catch(err => { alert("Failed: " + err); setRunningState(false); });
  }

  // ── Stop ──────────────────────────────────────────────────────────────────────
  function stopCampaign() {
    fetch("/stop", { method: "POST" }).then(() => {
      setRunningState(false);
      fetchStatus();
    });
  }

  // ── Reset ─────────────────────────────────────────────────────────────────────
  function resetCampaign() {
    if (polling) { clearInterval(polling); polling = null; }
    fetch("/reset", { method: "POST" }).then(() => {
      document.getElementById("call-list").innerHTML =
        '<div class="empty" id="empty-state">Enter numbers above and click Start Campaign.</div>';
      document.getElementById("stats-bar").style.display    = "none";
      document.getElementById("progress-wrap").style.display = "none";
      setRunningState(false);
    });
  }

  // ── Poll status ───────────────────────────────────────────────────────────────
  function fetchStatus() {
    fetch("/status")
      .then(r => r.json())
      .then(data => {
        updateStats(data.stats);
        updateProgress(data.stats);
        renderCalls(data.calls);

        if (!data.running) {
          if (polling) { clearInterval(polling); polling = null; }
          setRunningState(false);
        }
      });
  }

  // ── UI helpers ────────────────────────────────────────────────────────────────
  function setRunningState(running) {
    document.getElementById("start-btn").disabled = running;
    document.getElementById("stop-btn").disabled  = !running;
  }

  function updateStats(s) {
    if (!s) return;
    document.getElementById("stat-total").textContent    = s.total;
    document.getElementById("stat-calling").textContent  = s.calling;
    document.getElementById("stat-done").textContent     = s.done;
    document.getElementById("stat-voicemail").textContent = s.voicemail;
    document.getElementById("stat-failed").textContent   = s.failed;
    document.getElementById("stat-pending").textContent  = s.pending;
  }

  function updateProgress(s) {
    if (!s || !s.total) return;
    const finished = s.done + s.failed;
    const pct      = Math.round(finished / s.total * 100);
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("progress-pct").textContent  = pct + "%";
    document.getElementById("progress-label").textContent =
      `${finished} of ${s.total} calls completed`;
  }

  // ── Render call cards ─────────────────────────────────────────────────────────
  function renderCalls(calls) {
    if (!calls || !calls.length) return;
    const list = document.getElementById("call-list");
    list.innerHTML = calls.map(call => buildCard(call)).join("");
  }

  function buildCard(call) {
    const isActive = call.status === "calling" || call.status === "in-progress";

    // Badge
    let badgeClass, badgeLabel;
    if (call.status === "calling")     { badgeClass = "badge-calling";     badgeLabel = "Calling"; }
    else if (call.status === "in-progress") { badgeClass = "badge-in-progress"; badgeLabel = "In Progress"; }
    else if (call.status === "ended")  {
      badgeClass = call.voicemail ? "badge-ended-vm" : "badge-ended";
      badgeLabel = call.voicemail ? "Voicemail" : "Ended";
    }
    else if (call.status === "error")  { badgeClass = "badge-error";   badgeLabel = "Error"; }
    else                               { badgeClass = "badge-pending"; badgeLabel = "Pending"; }

    // Sentiment pill
    const sentiment = call.sentiment
      ? `<span class="sentiment sentiment-${call.sentiment}">${call.sentiment}</span>` : "";

    // Icons
    const checkmark = call.successful === true
      ? `<span class="icon-check">&#10003; Success</span>` : "";
    const vmIcon = call.voicemail
      ? `<span class="icon-voicemail">&#128222; VM</span>` : "";

    // Duration
    const duration = call.duration
      ? `<span class="duration">${call.duration}</span>` : "";

    // Summary
    let summaryHtml = "";
    if (call.summary) {
      summaryHtml = `<div class="call-summary">${esc(call.summary)}</div>`;
    } else if (call.status === "error" && call.summary === null) {
      summaryHtml = "";
    }

    // Recording
    const recHtml = call.recording_url
      ? `<a class="recording-link" href="${esc(call.recording_url)}" target="_blank">&#9654; Listen to recording</a>` : "";

    // Retry button — only show when call is done (not currently active)
    const canRetry = !isActive;
    const retryBtn = canRetry
      ? `<button class="retry-btn" onclick="retryCall(${call.index})">&#8635; Retry</button>` : "";

    return `
      <div class="call-card ${isActive ? "active" : ""}">
        <div class="call-top">
          <span class="call-number">${esc(call.number)}</span>
          <div class="call-meta">
            ${duration}
            <span class="badge ${badgeClass}">${badgeLabel}</span>
            ${sentiment}
            ${vmIcon}
            ${checkmark}
            ${retryBtn}
          </div>
        </div>
        ${summaryHtml}
        ${recHtml}
      </div>`;
  }

  function retryCall(idx) {
    if (!confirm("Retry this call?")) return;
    fetch(`/retry/${idx}`, { method: "POST" })
      .then(r => r.json())
      .then(d => { if (d.error) alert("Retry failed: " + d.error); })
      .catch(() => alert("Retry request failed"));
  }

  function esc(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
