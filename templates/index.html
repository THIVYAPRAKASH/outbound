<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outbound Calling Campaign</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.6rem;
      color: #fff;
      margin-bottom: 8px;
    }
    p.sub {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 24px;
      max-width: 620px;
      margin: 0 auto 24px auto;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 100px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #4f8ef7; }
    button {
      margin-top: 16px;
      padding: 10px 28px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a78e0; }
    button:disabled { background: #2a2d3a; color: #555; cursor: not-allowed; }

    .call-list { max-width: 620px; margin: 0 auto; }
    .call-item {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .call-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .call-number { font-weight: 600; font-size: 1rem; color: #fff; }
    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pending    { background: #2a2d3a; color: #888; }
    .badge-calling    { background: #1e3a5f; color: #4f8ef7; }
    .badge-in-progress { background: #1e3a5f; color: #4f8ef7; }
    .badge-ended      { background: #1a3a2a; color: #4caf50; }
    .badge-error      { background: #3a1a1a; color: #f44336; }
    .summary {
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.5;
      margin-top: 6px;
      white-space: pre-wrap;
    }
    #status-bar {
      max-width: 620px;
      margin: 0 auto 16px auto;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Outbound Calling Campaign</h1>
    <p class="sub">Enter phone numbers below (one per line, include country code e.g. +12025551234)</p>

    <label>Phone Numbers</label>
    <textarea id="numbers-input" placeholder="+12025551234&#10;+13105559876"></textarea>

    <button id="start-btn" onclick="startCampaign()">Start Campaign</button>
  </div>

  <div id="status-bar"></div>
  <div class="call-list" id="call-list"></div>

  <script>
    let polling = null;

    function startCampaign() {
      const raw = document.getElementById("numbers-input").value;
      const numbers = raw.split("\n").map(n => n.trim()).filter(n => n);

      if (numbers.length === 0) {
        alert("Please enter at least one phone number.");
        return;
      }

      document.getElementById("start-btn").disabled = true;
      document.getElementById("status-bar").textContent = "Starting campaign...";

      fetch("/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ numbers }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.error) {
          alert(data.error);
          document.getElementById("start-btn").disabled = false;
          return;
        }
        // Start polling for status updates
        if (polling) clearInterval(polling);
        polling = setInterval(fetchStatus, 3000);
        fetchStatus();
      })
      .catch(err => {
        alert("Failed to start: " + err);
        document.getElementById("start-btn").disabled = false;
      });
    }

    function fetchStatus() {
      fetch("/status")
        .then(r => r.json())
        .then(data => {
          renderCalls(data.calls);
          const total = data.calls.length;
          const done  = data.calls.filter(c => c.status === "ended" || c.status === "error").length;
          document.getElementById("status-bar").textContent =
            data.running
              ? `Campaign running... ${done}/${total} calls completed`
              : done === total && total > 0
                ? `Campaign complete. ${total}/${total} calls done.`
                : "";
          if (!data.running && done === total && total > 0) {
            clearInterval(polling);
            document.getElementById("start-btn").disabled = false;
          }
        });
    }

    function renderCalls(calls) {
      const list = document.getElementById("call-list");
      list.innerHTML = calls.map(call => `
        <div class="call-item">
          <div class="call-header">
            <span class="call-number">${call.number}</span>
            <span class="badge badge-${call.status}">${call.status}</span>
          </div>
          ${call.summary
            ? `<div class="summary">${escapeHtml(call.summary)}</div>`
            : call.status === "calling" || call.status === "in-progress"
              ? `<div class="summary" style="color:#4f8ef7">Call in progress...</div>`
              : ""}
        </div>
      `).join("");
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>

</body>
</html>
